<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniGPT Chat</title>

<style>
* {
    box-sizing: border-box;
}

body {
    max-width: 900px;
    margin: auto;
    padding: 24px;
    font-family: Arial, sans-serif;
    color: #1f2933;
    background: #f6f7f9;
}

main {
    display: grid;
    gap: 16px;
}

h1 {
    margin: 0;
    font-size: 28px;
}

textarea {
    width: 100%;
    min-height: 150px;
    padding: 12px;
    border: 1px solid #c7ccd3;
    border-radius: 6px;
    font: inherit;
    resize: vertical;
    background: #ffffff;
}

button {
    width: fit-content;
    padding: 10px 16px;
    border: 0;
    border-radius: 6px;
    font: inherit;
    color: #ffffff;
    background: #225c7a;
    cursor: pointer;
}

button:disabled {
    cursor: wait;
    opacity: 0.7;
}

.output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}

.view-toggle {
    display: inline-flex;
    overflow: hidden;
    border: 1px solid #c7ccd3;
    border-radius: 6px;
    background: #ffffff;
}

.view-toggle button {
    padding: 8px 12px;
    border-radius: 0;
    color: #324250;
    background: transparent;
}

.view-toggle button.active {
    color: #ffffff;
    background: #225c7a;
}

#output {
    min-height: 160px;
    padding: 16px;
    border: 1px solid #c7ccd3;
    border-radius: 6px;
    background: #ffffff;
}

.raw-output {
    white-space: pre-wrap;
    font-family: Consolas, "Courier New", monospace;
    line-height: 1.5;
}

.markdown-output {
    line-height: 1.6;
}

.markdown-output h1,
.markdown-output h2,
.markdown-output h3 {
    margin: 18px 0 8px;
    line-height: 1.25;
}

.markdown-output h1 {
    font-size: 26px;
}

.markdown-output h2 {
    font-size: 22px;
}

.markdown-output h3 {
    font-size: 18px;
}

.markdown-output p,
.markdown-output ul,
.markdown-output ol,
.markdown-output blockquote,
.markdown-output pre {
    margin: 0 0 12px;
}

.markdown-output ul,
.markdown-output ol {
    padding-left: 24px;
}

.markdown-output blockquote {
    padding-left: 12px;
    border-left: 3px solid #8aa8b8;
    color: #435666;
}

.markdown-output code {
    padding: 2px 5px;
    border-radius: 4px;
    background: #eef1f4;
    font-family: Consolas, "Courier New", monospace;
    font-size: 0.95em;
}

.markdown-output pre {
    overflow-x: auto;
    padding: 12px;
    border-radius: 6px;
    background: #18232f;
    color: #eef6fb;
}

.markdown-output pre code {
    padding: 0;
    background: transparent;
    color: inherit;
}
</style>
</head>

<body>
<main>
    <h1>MiniGPT Chat</h1>

    <textarea id="prompt" placeholder="Typ je prompt..."></textarea>

    <button id="submit" type="button" onclick="sendPrompt()">Generate</button>

    <div class="output-header">
        <strong>Output</strong>
        <div class="view-toggle">
            <button id="previewButton" class="active" type="button" onclick="setOutputView('preview')">Preview</button>
            <button id="rawButton" type="button" onclick="setOutputView('raw')">Markdown</button>
        </div>
    </div>

    <div id="output" class="markdown-output"></div>
</main>

<script>
let latestOutput = "";
let outputView = "preview";

async function sendPrompt() {
    const prompt = document.getElementById("prompt").value;
    const button = document.getElementById("submit");

    try {
        button.disabled = true;
        latestOutput = "Generating...";
        renderOutput();

        const response = await fetch("/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt })
        });

        const data = await response.json();

        if (data.error) {
            latestOutput = "Error: " + data.error;
            renderOutput();
            return;
        }

        if (!data.result) {
            latestOutput = "No result returned from backend";
            renderOutput();
            return;
        }

        latestOutput = data.result;
        renderOutput();

    } catch (err) {
        latestOutput = "Fetch failed: " + err.message;
        renderOutput();
    } finally {
        button.disabled = false;
    }
}

function setOutputView(view) {
    outputView = view;
    document.getElementById("previewButton").classList.toggle("active", view === "preview");
    document.getElementById("rawButton").classList.toggle("active", view === "raw");
    renderOutput();
}

function renderOutput() {
    const output = document.getElementById("output");

    if (outputView === "raw") {
        output.className = "raw-output";
        output.innerText = latestOutput;
        return;
    }

    output.className = "markdown-output";
    output.innerHTML = renderMarkdown(latestOutput);
}

function renderMarkdown(markdown) {
    const blocks = [];
    const codeBlocks = [];

    const withoutCode = markdown.replace(/```([\s\S]*?)```/g, function(_, code) {
        const index = codeBlocks.push(code.replace(/^\w+\n/, "")) - 1;
        return "\n@@CODE_BLOCK_" + index + "@@\n";
    });

    const lines = withoutCode.split(/\r?\n/);
    let paragraph = [];
    let list = null;

    function flushParagraph() {
        if (paragraph.length === 0) {
            return;
        }
        blocks.push("<p>" + inlineMarkdown(paragraph.join(" ")) + "</p>");
        paragraph = [];
    }

    function flushList() {
        if (!list) {
            return;
        }
        blocks.push("<" + list.type + ">" + list.items.join("") + "</" + list.type + ">");
        list = null;
    }

    lines.forEach(function(line) {
        const trimmed = line.trim();

        if (!trimmed) {
            flushParagraph();
            flushList();
            return;
        }

        const codeMatch = trimmed.match(/^@@CODE_BLOCK_(\d+)@@$/);
        if (codeMatch) {
            flushParagraph();
            flushList();
            const code = escapeHtml(codeBlocks[Number(codeMatch[1])] || "");
            blocks.push("<pre><code>" + code + "</code></pre>");
            return;
        }

        const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
        if (heading) {
            flushParagraph();
            flushList();
            const level = heading[1].length;
            blocks.push("<h" + level + ">" + inlineMarkdown(heading[2]) + "</h" + level + ">");
            return;
        }

        const quote = trimmed.match(/^>\s+(.+)$/);
        if (quote) {
            flushParagraph();
            flushList();
            blocks.push("<blockquote>" + inlineMarkdown(quote[1]) + "</blockquote>");
            return;
        }

        const unordered = trimmed.match(/^[-*]\s+(.+)$/);
        const ordered = trimmed.match(/^\d+\.\s+(.+)$/);
        if (unordered || ordered) {
            flushParagraph();
            const type = unordered ? "ul" : "ol";
            if (!list || list.type !== type) {
                flushList();
                list = { type: type, items: [] };
            }
            list.items.push("<li>" + inlineMarkdown((unordered || ordered)[1]) + "</li>");
            return;
        }

        paragraph.push(trimmed);
    });

    flushParagraph();
    flushList();

    return blocks.join("");
}

function inlineMarkdown(text) {
    return escapeHtml(text)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
}

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}
</script>
</body>
</html>
